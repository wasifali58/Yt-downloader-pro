<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Download Starting... · WASIF ALI</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:'Plus Jakarta Sans',sans-serif}
        body{background:#0a0a0f;min-height:100vh;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
        body::before{content:"";position:fixed;top:0;left:0;width:100%;height:100%;background:radial-gradient(circle at 30% 30%,rgba(255,0,0,0.15) 0%,transparent 40%),radial-gradient(circle at 70% 70%,rgba(0,100,255,0.1) 0%,transparent 40%);pointer-events:none;z-index:0}
        .card{position:relative;z-index:10;background:rgba(20,20,40,0.9);backdrop-filter:blur(30px);border:1px solid rgba(255,0,0,0.3);border-radius:40px;padding:50px 40px;text-align:center;max-width:500px;width:90%;box-shadow:0 30px 60px rgba(0,0,0,0.6)}
        .icon{width:80px;height:80px;background:linear-gradient(135deg,#FF0000,#cc0000);border-radius:24px;display:flex;align-items:center;justify-content:center;margin:0 auto 25px;box-shadow:0 10px 30px rgba(255,0,0,0.4)}
        .icon i{font-size:40px;color:#fff}
        h2{color:#fff;font-size:24px;font-weight:700;margin-bottom:10px}
        .filename{color:#aaa;font-size:14px;margin-bottom:25px;word-break:break-all;background:rgba(0,0,0,0.3);padding:8px 16px;border-radius:40px;display:inline-block}
        .progress{width:100%;height:4px;background:rgba(255,255,255,0.1);border-radius:10px;margin:20px 0 10px;overflow:hidden}
        .progress-bar{width:0%;height:100%;background:linear-gradient(90deg,#FF0000,#ff6666);border-radius:10px;animation:loading 2s ease-in-out infinite}
        @keyframes loading{0%{width:0%}50%{width:70%}100%{width:100%}}
        .note{color:#666;font-size:13px;margin-top:25px}
        .footer{position:fixed;bottom:20px;left:0;right:0;text-align:center;color:#555;font-size:12px}
        .footer span{color:#FF0000;font-weight:600}
    </style>
</head>
<body>
<div class="card">
    <div class="icon"><i class="fas fa-download"></i></div>
    <h2>Starting Your Download</h2>
    <div class="filename" id="filenameDisplay">video.mp4</div>
    <div class="progress"><div class="progress-bar"></div></div>
    <p class="note">Developed by <span style="color:#FF0000;font-weight:600">WASIF ALI</span></p>
</div>

<script>
(async function(){
    const params = new URLSearchParams(window.location.search);
    const url = params.get('url');
    const filename = params.get('filename') || 'video.mp4';
    
    document.getElementById('filenameDisplay').textContent = filename;
    
    if (!url) {
        document.querySelector('h2').textContent = 'Error';
        document.querySelector('.filename').textContent = 'No download URL provided';
        return;
    }
    
    // ✅ وہی Blob Download جو Instagram ڈاؤنلوڈر میں کام کرتا ہے
    async function startDownload() {
        try {
            const response = await fetch(url, { mode: 'cors' });
            const blob = await response.blob();
            const blobUrl = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = blobUrl;
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(blobUrl);
            
            document.querySelector('h2').textContent = 'Download Complete!';
            document.querySelector('.progress-bar').style.animation = 'none';
            document.querySelector('.progress-bar').style.width = '100%';
            
            // 1.5 سیکنڈ بعد واپس چلے جائیں
            setTimeout(() => {
                window.history.back();
            }, 1500);
        } catch (e) {
            // Fallback: نیا ٹیب کھولیں
            window.open(url, '_blank');
            document.querySelector('h2').textContent = 'Opening in new tab...';
            setTimeout(() => {
                window.history.back();
            }, 2000);
        }
    }
    
    startDownload();
})();
</script>
</body>
</html>
