<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Download Started · WASIF ALI</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:'Plus Jakarta Sans',sans-serif}
        body{background:#0a0a0f;min-height:100vh;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
        body::before{content:"";position:fixed;top:0;left:0;width:100%;height:100%;background:radial-gradient(circle at 30% 30%,rgba(255,0,0,0.2) 0%,transparent 40%),radial-gradient(circle at 70% 70%,rgba(0,100,255,0.15) 0%,transparent 40%);pointer-events:none;z-index:0}
        
        .page-container{position:relative;z-index:10;text-align:center}
        
        /* Professional Pulse Loader */
        .loader-container{position:relative;width:120px;height:120px;margin:0 auto 30px}
        .loader-ring{position:absolute;width:100%;height:100%;border-radius:50%;border:3px solid transparent}
        .loader-ring:nth-child(1){border-top:3px solid #FF0000;border-right:3px solid #FF0000;animation:spin 2s linear infinite}
        .loader-ring:nth-child(2){width:90px;height:90px;top:15px;left:15px;border-bottom:3px solid #ff4444;border-left:3px solid #ff4444;animation:spin 1.5s reverse infinite}
        .loader-ring:nth-child(3){width:60px;height:60px;top:30px;left:30px;border-top:3px solid #ff8888;border-right:3px solid #ff8888;animation:spin 1s linear infinite}
        @keyframes spin{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}
        .loader-icon{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:36px;color:#FF0000}
        
        .card{background:rgba(20,20,40,0.9);backdrop-filter:blur(30px);border:1px solid rgba(255,0,0,0.3);border-radius:40px;padding:40px;text-align:center;max-width:500px;width:90%;margin:0 auto;box-shadow:0 30px 60px rgba(0,0,0,0.6)}
        h2{color:#fff;font-size:24px;font-weight:700;margin-bottom:10px}
        .filename{color:#aaa;font-size:13px;margin-bottom:25px;word-break:break-all;background:rgba(0,0,0,0.3);padding:8px 16px;border-radius:40px;display:inline-block}
        
        .community-buttons{display:flex;gap:12px;margin-top:30px;justify-content:center}
        .community-btn{flex:1;padding:14px 20px;border-radius:20px;font-weight:600;font-size:14px;text-decoration:none;display:flex;align-items:center;justify-content:center;gap:8px;transition:0.3s;color:#fff}
        .whatsapp-btn{background:linear-gradient(135deg,#075e54,#128c7e);border:1px solid #25d366}
        .telegram-btn{background:linear-gradient(135deg,#1c92d2,#0088cc);border:1px solid #00aaff}
        .community-btn:hover{transform:translateY(-2px);box-shadow:0 10px 25px rgba(0,0,0,0.3)}
        .community-btn i{font-size:20px}
        
        .back-btn{display:inline-block;margin-top:20px;color:#666;text-decoration:none;font-size:13px;transition:0.2s}
        .back-btn:hover{color:#fff}
        
        .footer{position:fixed;bottom:20px;left:0;right:0;text-align:center;color:#555;font-size:12px}
        .footer span{color:#FF0000;font-weight:600}
    </style>
</head>
<body>

<div class="page-container">
    <div class="loader-container">
        <div class="loader-ring"></div>
        <div class="loader-ring"></div>
        <div class="loader-ring"></div>
        <i class="fas fa-download loader-icon"></i>
    </div>
    
    <div class="card">
        <h2 id="statusText">Starting Download...</h2>
        <div class="filename" id="filenameDisplay">video.mp4</div>
        
        <div class="community-buttons">
            <a href="https://chat.whatsapp.com/DfbU2tMYyHc31JufbPoPCx?mode=gi_t" target="_blank" class="community-btn whatsapp-btn">
                <i class="fab fa-whatsapp"></i> Join WhatsApp
            </a>
            <a href="https://t.me/FREEHACKS95" target="_blank" class="community-btn telegram-btn">
                <i class="fab fa-telegram-plane"></i> Join Telegram
            </a>
        </div>
        
        <a href="javascript:history.back()" class="back-btn">← Back to Downloader</a>
    </div>
</div>

<div class="footer">Developed by <span>WASIF ALI</span> · Powered by <span>Cloud API</span></div>

<script>
(async function(){
    const params = new URLSearchParams(window.location.search);
    const url = params.get('url');
    const filename = params.get('filename') || 'video.mp4';
    
    document.getElementById('filenameDisplay').textContent = filename;
    
    if (!url) {
        document.getElementById('statusText').textContent = 'Error';
        document.querySelector('.filename').textContent = 'No download URL provided';
        return;
    }
    
    // ✅ مستقل حل: پوشیدہ iframe سے ڈاؤن لوڈ شروع کریں
    function startDownload() {
        const iframe = document.createElement('iframe');
        iframe.style.display = 'none';
        iframe.src = url;
        document.body.appendChild(iframe);
        
        // 3 سیکنڈ بعد iframe ہٹا دیں
        setTimeout(() => {
            document.body.removeChild(iframe);
            document.getElementById('statusText').textContent = 'Download Started ✓';
        }, 3000);
    }
    
    // فوراً ڈاؤن لوڈ شروع کریں
    startDownload();
})();
</script>
</body>
</html>
