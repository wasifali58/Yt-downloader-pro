<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Download Starting...</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:'Plus Jakarta Sans',sans-serif}
        body{background:#0a0a0f;min-height:100vh;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
        body::before{content:"";position:fixed;top:0;left:0;width:100%;height:100%;background:radial-gradient(circle at 30% 30%,rgba(255,0,0,0.15) 0%,transparent 40%),radial-gradient(circle at 70% 70%,rgba(0,100,255,0.1) 0%,transparent 40%);pointer-events:none;z-index:0}
        .card{position:relative;z-index:10;background:rgba(20,20,40,0.8);backdrop-filter:blur(30px);border:1px solid rgba(255,0,0,0.3);border-radius:40px;padding:50px 40px;text-align:center;max-width:500px;width:90%}
        .icon{width:80px;height:80px;background:linear-gradient(135deg,#FF0000,#cc0000);border-radius:24px;display:flex;align-items:center;justify-content:center;margin:0 auto 25px;box-shadow:0 10px 30px rgba(255,0,0,0.4)}
        .icon i{font-size:40px;color:#fff}
        h2{color:#fff;font-size:24px;font-weight:700;margin-bottom:10px}
        p{color:#aaa;font-size:14px;margin-bottom:30px}
        .progress{width:100%;height:6px;background:rgba(255,255,255,0.1);border-radius:10px;overflow:hidden}
        .progress-bar{width:0%;height:100%;background:linear-gradient(90deg,#FF0000,#ff6666);border-radius:10px;animation:loading 2s ease-in-out infinite}
        @keyframes loading{0%{width:0%}50%{width:70%}100%{width:100%}}
        .filename{color:#fff;font-size:14px;margin-top:20px;word-break:break-all}
        .footer{position:fixed;bottom:20px;left:0;right:0;text-align:center;color:#666;font-size:12px}
        .footer span{color:#FF0000}
    </style>
</head>
<body>
<div class="card">
    <div class="icon"><i class="fas fa-download"></i></div>
    <h2>Preparing Your Download</h2>
    <p>Your video is being processed...</p>
    <div class="progress"><div class="progress-bar"></div></div>
    <div class="filename" id="filenameDisplay">video.mp4</div>
</div>
<div class="footer">Developed by <span>WASIF ALI</span></div>

<script>
(function(){
    const params = new URLSearchParams(window.location.search);
    const url = params.get('url');
    const filename = params.get('filename') || 'video.mp4';
    
    document.getElementById('filenameDisplay').textContent = filename;
    
    if (!url) {
        document.querySelector('h2').textContent = 'Error';
        document.querySelector('p').textContent = 'No download URL provided.';
        return;
    }
    
    // ✅ خودکار ڈاؤن لوڈ شروع کریں
    function startDownload() {
        // پوشیدہ iframe بنائیں جو ڈاؤن لوڈ کو ٹریگر کرے
        const iframe = document.createElement('iframe');
        iframe.style.display = 'none';
        iframe.src = url;
        document.body.appendChild(iframe);
        
        // 5 سیکنڈ بعد iframe ہٹا دیں
        setTimeout(() => {
            document.body.removeChild(iframe);
        }, 5000);
        
        // 1.5 سیکنڈ بعد واپس مرکزی سائٹ پر لے جائیں (اختیاری)
        setTimeout(() => {
            window.history.back();
        }, 1500);
    }
    
    // فوراً ڈاؤن لوڈ شروع کریں
    startDownload();
})();
</script>
</body>
</html>
