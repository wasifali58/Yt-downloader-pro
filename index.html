    <style>

        body{background:#0a0a0f;min-height:100vh;position:relative;overflow-x:hidden}
        body::before{content:"";position:fixed;top:0;left:0;width:100%;height:100%;background:radial-gradient(circle at 30% 30%,rgba(255,0,0,0.15) 0%,transparent 40%),radial-gradient(circle at 70% 70%,rgba(0,100,255,0.1) 0%,transparent 40%);pointer-events:none;z-index:0}
        
        /* Side Menu */
        .side-menu-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.7);backdrop-filter:blur(8px);z-index:999;opacity:0;visibility:hidden;transition:all 0.3s}
        .side-menu-overlay.active{opacity:1;visibility:visible}
        .side-menu{position:fixed;top:0;left:-300px;width:280px;height:100%;background:linear-gradient(180deg,#0d1117 0%,#161b22 100%);z-index:1000;transition:left 0.4s;box-shadow:10px 0 40px rgba(0,0,0,0.5);border-right:1px solid rgba(255,0,0,0.2);overflow-y:auto;padding:24px 0}
        .side-menu.active{left:0}
        .menu-header{padding:0 20px 24px;border-bottom:1px solid rgba(255,255,255,0.08);display:flex;align-items:center;justify-content:space-between}
        .menu-logo{display:flex;align-items:center;gap:10px}
        .menu-logo i{font-size:28px;color:#FF0000}
        .menu-logo span{color:#fff;font-weight:700;font-size:20px}
        .close-menu{background:rgba(255,255,255,0.05);border:none;width:40px;height:40px;border-radius:12px;color:#9ca3af;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:0.2s}

        .menu-section{padding:24px 20px;border-bottom:1px solid rgba(255,255,255,0.05)}

        .menu-item{display:flex;align-items:center;gap:14px;padding:14px 16px;color:#d1d5db;font-weight:500;font-size:15px;border-radius:14px;cursor:pointer;margin-bottom:6px;transition:0.2s}

        .main-content{position:relative;z-index:10;min-height:100vh;padding:20px 16px 40px;display:flex;flex-direction:column}
        .top-bar{display:flex;align-items:center;justify-content:space-between;max-width:1000px;margin:0 auto 20px;width:100%;padding:16px 0}
        .menu-toggle{background:rgba(255,255,255,0.05);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,0.1);width:50px;height:50px;border-radius:16px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:22px;cursor:pointer;transition:0.2s}
        .menu-toggle:hover{background:#FF0000;border-color:#FF0000}
        .header-logo{display:flex;align-items:center;gap:12px}
        .logo-icon{width:48px;height:48px;background:linear-gradient(135deg,#FF0000,#cc0000);border-radius:16px;display:flex;align-items:center;justify-content:center;box-shadow:0 8px 25px rgba(255,0,0,0.3)}
        .logo-icon i{font-size:24px;color:#fff}
        .logo-text h2{color:#fff;font-weight:700;font-size:22px}
        .logo-text span{background:linear-gradient(135deg,#FF0000,#ff6666);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
        .pro-badge{background:linear-gradient(135deg,#FFD700,#FFA500);padding:8px 18px;border-radius:40px;font-size:13px;font-weight:700;color:#000}
        .downloader-card{max-width:1000px;width:100%;margin:0 auto;background:rgba(20,20,40,0.7);backdrop-filter:blur(30px);border:1px solid rgba(255,0,0,0.2);border-radius:40px;padding:35px}

        .input-label{color:#aaa;font-size:13px;font-weight:500;margin-bottom:12px;margin-left:8px;display:flex;align-items:center;gap:8px;text-transform:uppercase}
        .input-label i{color:#FF0000}
        .input-wrapper{display:flex;align-items:center;background:rgba(10,10,20,0.8);border-radius:60px;padding:5px 5px 5px 25px;border:2px solid rgba(255,0,0,0.2)}
        .input-wrapper:focus-within{border-color:#FF0000}
        .input-wrapper i{color:#FF0000;font-size:18px}
        .input-wrapper input{width:100%;background:transparent;border:none;padding:16px 15px;color:#fff;font-size:15px;outline:0}
        .input-wrapper input::placeholder{color:#555}
        .paste-btn{background:rgba(255,0,0,0.15);border:1px solid rgba(255,0,0,0.3);color:#ff8888;padding:12px 24px;border-radius:40px;font-size:13px;font-weight:600;margin-right:5px;cursor:pointer}
        .fetch-btn{width:100%;background:linear-gradient(135deg,#FF0000,#cc0000);border:none;padding:18px;border-radius:60px;font-weight:700;font-size:17px;color:#fff;display:flex;align-items:center;justify-content:center;gap:12px;cursor:pointer;margin-top:10px}
        .fetch-btn:disabled{opacity:0.5}
        .loading-container{display:none;align-items:center;justify-content:center;flex-direction:column;padding:50px 20px}
        .loading-container.active{display:flex}
        .yt-loader{width:100px;height:100px;position:relative;margin-bottom:25px}
        .yt-loader .pulse-ring{position:absolute;width:100%;height:100%;border-radius:50%;background:rgba(255,0,0,0.1);animation:pulse 2s infinite}
        .yt-loader .pulse-ring:nth-child(2){animation-delay:0.5s}
        .yt-loader .pulse-ring:nth-child(3){animation-delay:1s}
        @keyframes pulse{0%{transform:scale(0.5);opacity:1}100%{transform:scale(1.5);opacity:0}}
        .yt-loader .yt-icon{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:40px;color:#FF0000}
        .loading-text{color:#fff;font-size:18px;font-weight:600}
        .result-container{display:none;margin-top:30px}
        .result-container.active{display:block}
        .video-preview{display:flex;gap:25px;margin-bottom:30px;padding:25px;background:linear-gradient(135deg,rgba(255,0,0,0.05),rgba(0,0,0,0.3));border-radius:30px}
        .thumbnail-wrapper{width:260px;height:146px;border-radius:20px;overflow:hidden}
        .thumbnail-wrapper img{width:100%;height:100%;object-fit:cover}
        .video-title{color:#fff;font-size:20px;font-weight:700;margin-bottom:12px}
        .video-meta{display:flex;gap:25px;color:#aaa;font-size:14px;margin-bottom:15px}
        .video-meta i{margin-right:6px;color:#FF0000}
        .duration-badge{background:rgba(255,0,0,0.15);padding:4px 14px;border-radius:40px;font-size:13px;color:#ff8888}
        .quality-section{background:rgba(10,10,20,0.6);border-radius:25px;padding:25px}
        .section-title{color:#fff;font-size:18px;font-weight:600;margin-bottom:20px}
        .section-title i{color:#FF0000}
        .quality-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:12px;margin-bottom:25px}
        .quality-card{background:rgba(20,20,40,0.8);border:2px solid rgba(255,255,255,0.05);border-radius:18px;padding:16px 12px;cursor:pointer;text-align:center}
        .quality-card.selected{border-color:#FF0000;background:rgba(255,0,0,0.1)}
        .quality-card .check{display:none;color:#FF0000;font-size:14px;margin-bottom:5px}
        .quality-card.selected .check{display:block}
        .quality-card .res{color:#fff;font-weight:700;font-size:18px}
        .quality-card .type{color:#666;font-size:11px}
        .download-action{display:flex;gap:15px}
        .download-btn{flex:1;background:linear-gradient(135deg,#FF0000,#cc0000);border:none;padding:18px;border-radius:18px;font-weight:700;font-size:16px;color:#fff;cursor:pointer}
        .download-btn:disabled{opacity:0.4;background:#333}
        .footer{max-width:1000px;margin:35px auto 0;text-align:center;padding:25px 0 10px;border-top:1px solid rgba(255,255,255,0.05)}
        .footer-name{color:#fff;font-size:16px}
        .footer-name i{color:#FF0000;margin:0 8px}
        .footer-name span{background:linear-gradient(135deg,#FF0000,#ff6666);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
        .floating-wa{position:fixed;bottom:25px;right:25px;width:60px;height:60px;background:#25d366;border-radius:30px;display:flex;align-items:center;justify-content:center;box-shadow:0 10px 35px rgba(37,211,102,0.4);z-index:100;text-decoration:none;animation:waPulse 2s infinite}
        .floating-wa i{font-size:32px;color:#fff}
        @keyframes waPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.1)}}
        .toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%);background:rgba(20,20,40,0.95);color:#fff;padding:14px 30px;border-radius:60px;font-weight:500;z-index:1000;opacity:0;transition:0.3s;border:1px solid rgba(255,0,0,0.3);white-space:nowrap}
        .toast.show{opacity:1}
        @media (max-width:700px){.video-preview{flex-direction:column}.thumbnail-wrapper{width:100%;height:auto;aspect-ratio:16/9}.quality-grid{grid-template-columns:repeat(2,1fr)}}
    </style>
</head>
<body>

<div class="main-content">
    <div class="top-bar">
        <div class="menu-toggle" id="menuToggleBtn"><i class="fas fa-bars"></i></div>
        <div class="header-logo">
            <div class="logo-icon"><i class="fab fa-youtube"></i></div>

<script>
(function(){
    // Side Menu
    const menuToggle=document.getElementById('menuToggleBtn'),closeMenu=document.getElementById('closeMenuBtn');
    const sideMenu=document.getElementById('sideMenu'),overlay=document.getElementById('sideMenuOverlay');
    menuToggle.addEventListener('click',()=>{sideMenu.classList.add('active');overlay.classList.add('active');document.body.style.overflow='hidden';});
    closeMenu.addEventListener('click',()=>{sideMenu.classList.remove('active');overlay.classList.remove('active');document.body.style.overflow='';});
    overlay.addEventListener('click',()=>{sideMenu.classList.remove('active');overlay.classList.remove('active');document.body.style.overflow='';});

    const urlInput=document.getElementById('urlInput'),pasteBtn=document.getElementById('pasteBtn');
    const fetchBtn=document.getElementById('fetchBtn'),loading=document.getElementById('loading');
    const loadingText=document.getElementById('loadingText'),result=document.getElementById('result');
    const thumbnail=document.getElementById('thumbnail'),videoTitle=document.getElementById('videoTitle');
    const uploader=document.getElementById('uploader'),durationDisplay=document.getElementById('durationDisplay');
    const durationBadge=document.getElementById('durationBadge'),qualityGrid=document.getElementById('qualityGrid');
    const downloadBtn=document.getElementById('downloadBtn'),toast=document.getElementById('toast');

    const API_URL='https://wasifali-downloader-1s1g.vercel.app/api/youtube?url=';
    let videoData=null,selectedQuality=null;

    function showToast(msg){toast.textContent=msg;toast.classList.add('show');setTimeout(()=>toast.classList.remove('show'),3000);}
    pasteBtn.addEventListener('click',async()=>{try{urlInput.value=await navigator.clipboard.readText();showToast('Pasted!');}catch(e){urlInput.focus();}});

    function formatDuration(duration){
        if(!duration)return '';
        const parts=duration.split(':').map(p=>parseInt(p));
        if(parts.length===3){const[h,m,s]=parts;if(h>0)return `${h}h ${m}m`;if(m>0)return `${m}m ${s}s`;return `${s}s`;}
        return duration;
    }

    function renderQualities(links){
        qualityGrid.innerHTML='';selectedQuality=null;downloadBtn.disabled=true;
        if(!links||links.length===0){qualityGrid.innerHTML='<p style="color:#666;grid-column:1/-1;text-align:center;padding:30px">No qualities</p>';return;}
        links.sort((a,b)=>{
            if(a.type==='audio')return 1;if(b.type==='audio')return -1;
            return (parseInt(b.resolution)||0) - (parseInt(a.resolution)||0);
        });
        links.forEach(link=>{
            const card=document.createElement('div');card.className='quality-card';
            const isAudio=link.type==='audio';const res=link.resolution||(isAudio?'MP3':'Video');
            card.innerHTML=`<div class="check"><i class="fas fa-check-circle"></i></div><div class="res">${res}</div><div class="type">${isAudio?'AUDIO':'VIDEO'}</div>`;
            card.addEventListener('click',()=>{
                document.querySelectorAll('.quality-card').forEach(c=>c.classList.remove('selected'));
                card.classList.add('selected');selectedQuality=link;
                downloadBtn.disabled=false;
            });
            qualityGrid.appendChild(card);
        });
    }

    async function fetchVideo(){
        const url=urlInput.value.trim();if(!url){showToast('Enter YouTube URL');return;}
        result.classList.remove('active');loading.classList.add('active');fetchBtn.disabled=true;
        const int=setInterval(()=>{loadingText.textContent=['🔍 Fetching...','📡 Extracting...','⚡ Ready...'][Math.floor(Math.random()*3)];},400);
        try{
            const res=await fetch(API_URL+encodeURIComponent(url));
            const data=await res.json();
            clearInterval(int);
            if(data.success&&data.data){
                videoData=data.data;thumbnail.src=videoData.thumbnail||'';
                videoTitle.textContent=videoData.title||'YouTube Video';
                uploader.textContent=videoData.uploader||'Unknown';
                durationDisplay.textContent=videoData.duration||'-';
                durationBadge.textContent=formatDuration(videoData.duration);
                renderQualities(videoData.links);
                loading.classList.remove('active');result.classList.add('active');showToast('Select quality');
            }else throw new Error(data.error||'Failed');
        }catch(e){clearInterval(int);loading.classList.remove('active');showToast(e.message);}
        finally{fetchBtn.disabled=false;}
    }

    downloadBtn.addEventListener('click',function(){
        if(!selectedQuality)return;
        
        const title = (videoData?.title || 'video').replace(/[^\w\s]/gi, '').substring(0,40).trim()||'video';
        const quality = selectedQuality.resolution || (selectedQuality.type==='audio'?'audio':'video');
        const ext = selectedQuality.type==='audio'?'mp3':'mp4';
        const filename = `${title}_${quality}.${ext}`;
        
        // ✅ download.html پیج پر ری ڈائریکٹ کریں — وہاں Blob Download ہوگا
        window.location.href = `download.html?url=${encodeURIComponent(selectedQuality.download_url)}&filename=${encodeURIComponent(filename)}`;
    });
    
    fetchBtn.addEventListener('click', fetchVideo);
})();
</script>
